# ============================================================
# DEPORTE CONNECT - application.properties
# ============================================================

spring.application.name=deporte-connect-backend
server.port=8080

# ============================================================
# BASE DE DATOS
# ============================================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:deporteconnect;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# FIX: desactivar prepared statements (Transaction Pooler de Supabase no los soporta)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# data.sql desactivado (los datos están cargados en Supabase)
spring.sql.init.mode=${SQL_INIT_MODE:never}

# ============================================================
# Tomcat - CONFIG CORREGIDA
# ============================================================
# Las líneas anteriores (max-keep-alive-requests=1 + keep-alive-timeout=-1)
# causaban que Tomcat cerrara conexiones de forma abrupta, rompiendo el
# stream HTTP chunked ? EOFException en el cliente Android.
#
# Ahora: keep-alive normal y SIN compresión (la compresión es lo que más
# suele provocar el chunked mal cerrado contra el emulador).
server.tomcat.connection-timeout=30000
server.tomcat.max-keep-alive-requests=100
server.tomcat.keep-alive-timeout=20000
server.compression.enabled=false

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${JWT_SECRET:local-development-only-key-change-before-deploy-1234567890}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# ============================================================
# EMAIL / SMTP
# ============================================================
# Para activar notificaciones por correo en produccion, configurar:
# MAIL_ENABLED=true
# MAIL_HOST=smtp.tu-proveedor.com
# MAIL_PORT=587
# MAIL_USERNAME=usuario-smtp
# MAIL_PASSWORD=password-smtp
# MAIL_FROM=no-reply@deporteconnect.cl
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@deporteconnect.local}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

# ============================================================
# Logging
# ============================================================
logging.level.com.deporteconnect=DEBUG
logging.level.org.springframework.security=INFO

# ============================================================
# Swagger
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
